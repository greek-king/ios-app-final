name: FileSalvage
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "14"
  xcodeCompatibilityVersion: "Xcode 14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.filesalvage
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf
    ONLY_ACTIVE_ARCH: YES

targets:
  FileSalvage:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
        type: group
      - path: Models
        type: group
      - path: Views
        type: group
      - path: ViewModels
        type: group
      - path: Services
        type: group
      - path: Utils
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.filesalvage
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
